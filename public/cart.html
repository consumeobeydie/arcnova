<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcNova — Cart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <svg width="32" height="32" viewBox="0 0 100 100">
          <defs>
            <radialGradient id="sg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#00D4AA"/>
            </radialGradient>
          </defs>
          <polygon points="50,4 53,46 50,50 47,46" fill="url(#sg)"/>
          <polygon points="50,96 53,54 50,50 47,54" fill="url(#sg)"/>
          <polygon points="96,50 54,53 50,50 54,47" fill="url(#sg)"/>
          <polygon points="4,50 46,53 50,50 46,47" fill="url(#sg)"/>
          <polygon points="78,22 52,48 50,50 48,46" fill="#00D4AA" opacity="0.8"/>
          <polygon points="22,78 48,52 50,50 52,54" fill="#00D4AA" opacity="0.8"/>
          <polygon points="22,22 48,48 50,50 52,46" fill="#7B2FBE" opacity="0.8"/>
          <polygon points="78,78 52,52 50,50 48,54" fill="#7B2FBE" opacity="0.8"/>
          <circle cx="50" cy="50" r="4" fill="white"/>
        </svg>
        <span>ARCNOVA</span>
      </div>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/products.html">Products</a>
      </div>
      <div class="nav-actions">
        <button class="btn-wallet" id="connectWallet">🔗 Connect Wallet</button>
        <div class="cart-icon" onclick="window.location.href='/cart.html'">
          🛒 <span class="cart-count" id="cartCount">0</span>
        </div>
      </div>
    </div>
  </nav>

  <section style="padding: 120px 24px 80px; max-width: 1200px; margin: 0 auto;">
    <h1 style="font-size: 40px; font-weight: 800; margin-bottom: 8px;">Your Cart</h1>
    <p style="color: #888; margin-bottom: 40px;">Review your items and pay with USDC</p>

    <div style="display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start;">

      <!-- ÜRÜN LİSTESİ -->
      <div id="cartItems"></div>

      <!-- ÖZET -->
      <div style="
        background: #1a1a2e;
        border: 1px solid #2a2a4a;
        border-radius: 16px;
        padding: 24px;
        position: sticky;
        top: 100px;
      ">
        <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 24px;">Order Summary</h2>

        <div style="margin-bottom: 16px;">
          <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:#888; font-size:14px;">
            <span>Subtotal</span>
            <span id="subtotal">0.00 USDC</span>
          </div>
          <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:#888; font-size:14px;">
            <span>Network Fee</span>
            <span style="color:#00D4AA;">~0.001 USDC</span>
          </div>
          <div style="border-top: 1px solid #2a2a4a; padding-top: 12px; display:flex; justify-content:space-between; font-size:18px; font-weight:700;">
            <span>Total</span>
            <span id="total" style="color:#00D4AA;">0.00 USDC</span>
          </div>
        </div>

        <div style="
          background: rgba(0,212,170,0.05);
          border: 1px solid rgba(0,212,170,0.2);
          border-radius: 10px;
          padding: 12px;
          margin-bottom: 20px;
          font-size: 12px;
          color: #00D4AA;
        ">
          🔗 Payment will be recorded on Arc Network blockchain
        </div>

        <button onclick="proceedToCheckout()" style="
          width: 100%;
          background: linear-gradient(135deg, #00D4AA, #7B2FBE);
          color: white;
          border: none;
          padding: 16px;
          border-radius: 12px;
          cursor: pointer;
          font-size: 16px;
          font-weight: 700;
          margin-bottom: 12px;
        ">
          Proceed to Checkout
        </button>

        <button onclick="window.location.href='/products.html'" style="
          width: 100%;
          background: none;
          border: 1px solid #2a2a4a;
          color: #888;
          padding: 14px;
          border-radius: 12px;
          cursor: pointer;
          font-size: 14px;
        ">
          Continue Shopping
        </button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-logo">
        <span>ARCNOVA</span>
        <p>Shop the Future</p>
      </div>
      <p class="footer-copy">© 2026 ArcNova. Powered by Arc Network.</p>
    </div>
  </footer>

  <style>
    .cart-item {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .cart-item img {
      width: 100px;
      height: 100px;
      border-radius: 10px;
      object-fit: cover;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .cart-item-category { font-size: 12px; color: #00D4AA; margin-bottom: 8px; letter-spacing: 1px; }
    .cart-item-price { font-size: 18px; font-weight: 700; color: #00D4AA; }
    .qty-controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .qty-btn {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn:hover { border-color: #00D4AA; color: #00D4AA; }
    .remove-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
      transition: color 0.2s;
    }
    .remove-btn:hover { color: #ff4444; }
    @media (max-width: 768px) {
      section > div { grid-template-columns: 1fr !important; }
    }
  </style>

  <script src="/js/main.js"></script>
  <script>
    function renderCart() {
      const cartItems = document.getElementById('cartItems');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total');

      if (cart.length === 0) {
        cartItems.innerHTML = `
          <div style="text-align:center; padding:80px 0;">
            <div style="font-size:64px; margin-bottom:16px;">🛒</div>
            <h2 style="font-size:24px; margin-bottom:8px;">Your cart is empty</h2>
            <p style="color:#888; margin-bottom:32px;">Add some products to get started</p>
            <a href="/products.html" class="btn-primary">Start Shopping</a>
          </div>
        `;
        subtotalEl.textContent = '0.00 USDC';
        totalEl.textContent = '0.00 USDC';
        return;
      }

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      cartItems.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}">
          <div class="cart-item-info">
            <div class="cart-item-category">${item.category}</div>
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${(item.price * item.quantity).toFixed(2)} USDC</div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
              <span style="font-size:16px; font-weight:600;">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
              <span style="color:#888; font-size:13px;">${item.price} USDC each</span>
            </div>
          </div>
          <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑️</button>
        </div>
      `).join('');

      subtotalEl.textContent = `${subtotal.toFixed(2)} USDC`;
      totalEl.textContent = `${(subtotal + 0.001).toFixed(3)} USDC`;
    }

    function updateQty(id, change) {
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.quantity += change;
      if (item.quantity <= 0) {
        removeFromCart(id);
        return;
      }
      localStorage.setItem('arcnova-cart', JSON.stringify(cart));
      updateCartCount();
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(i => i.id !== id);
      localStorage.setItem('arcnova-cart', JSON.stringify(cart));
      updateCartCount();
      renderCart();
      showToast('Item removed from cart 🗑️');
    }

    function proceedToCheckout() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      const wallet = localStorage.getItem('walletAddress');
      if (!wallet) {
        alert('Please connect your wallet first!');
        return;
      }
      window.location.href = '/checkout.html';
    }

    renderCart();
  </script>
<script src="/js/navbar.js"></script></body>
</html>
