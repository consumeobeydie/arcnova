<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcNova Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00D4FF; --purple: #7B2FBE; --bg: #04040f; --bg2: #080818;
      --bg3: #0d0d24; --border: rgba(0,212,255,0.15); --text: #e0e8ff;
      --muted: #4a5070; --danger: #ff3a6e; --success: #00ff9d;
      --mono: 'Share Tech Mono', monospace; --sans: 'Rajdhani', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
    #loginScreen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, rgba(123,47,190,0.15) 0%, transparent 60%), var(--bg);
    }
    .login-box {
      width: 380px; border: 1px solid var(--border); border-radius: 16px;
      padding: 48px 40px; background: var(--bg2); position: relative; overflow: hidden;
    }
    .login-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center; }
    .login-logo span { font-size: 22px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(90deg, var(--cyan), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-subtitle { text-align: center; margin-bottom: 32px; font-size: 14px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
    .connect-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(123,47,190,0.1)); border: 1px solid var(--border); border-radius: 10px; color: var(--cyan); font-family: var(--sans); font-size: 15px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
    .connect-btn:hover { border-color: var(--cyan); box-shadow: 0 0 24px rgba(0,212,255,0.2); }
    .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { margin-top: 16px; padding: 12px; background: rgba(255,58,110,0.1); border: 1px solid rgba(255,58,110,0.3); border-radius: 8px; color: var(--danger); font-size: 13px; text-align: center; font-family: var(--mono); display: none; }
    .login-hint { margin-top: 16px; text-align: center; font-size: 12px; color: var(--muted); font-family: var(--mono); }
    #dashboard { display: none; min-height: 100vh; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .topbar-logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(90deg, var(--cyan), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .admin-badge { font-size: 11px; font-family: var(--mono); color: var(--cyan); padding: 4px 10px; border: 1px solid rgba(0,212,255,0.3); border-radius: 4px; letter-spacing: 1px; }
    .admin-addr { font-size: 12px; font-family: var(--mono); color: var(--muted); }
    .logout-btn { font-size: 12px; font-family: var(--sans); font-weight: 600; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { color: var(--danger); border-color: rgba(255,58,110,0.4); }
    .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
    .page-header { margin-bottom: 32px; display: flex; align-items: flex-end; justify-content: space-between; }
    .page-title { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
    .page-sub { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }
    .refresh-btn { display: flex; align-items: center; gap: 8px; font-size: 13px; font-family: var(--sans); font-weight: 600; color: var(--cyan); background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 8px 18px; cursor: pointer; transition: all 0.2s; }
    .refresh-btn:hover { background: rgba(0,212,255,0.1); }
    .refresh-btn.loading svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; position: relative; overflow: hidden; transition: border-color 0.3s; }
    .stat-card:hover { border-color: rgba(0,212,255,0.4); }
    .stat-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; }
    .stat-card.cyan::after { background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
    .stat-card.purple::after { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
    .stat-card.green::after { background: linear-gradient(90deg, transparent, var(--success), transparent); }
    .stat-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .stat-value { font-size: 36px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; line-height: 1; }
    .stat-card.cyan .stat-value { color: var(--cyan); }
    .stat-card.purple .stat-value { color: #a855f7; }
    .stat-card.green .stat-value { color: var(--success); }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--mono); }
    .section-title { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
    .table-wrap { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(0,212,255,0.04); }
    th { padding: 14px 20px; text-align: left; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid rgba(0,212,255,0.05); font-family: var(--mono); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,212,255,0.03); }
    .tx-link { color: var(--cyan); text-decoration: none; }
    .tx-link:hover { text-decoration: underline; }
    .addr-cell { color: var(--muted); }
    .amount-cell { color: var(--success); font-weight: 600; }
    .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; }
    .status-confirmed { background: rgba(0,255,157,0.1); color: var(--success); border: 1px solid rgba(0,255,157,0.2); }
    .status-pending { background: rgba(255,200,0,0.1); color: #ffc800; border: 1px solid rgba(255,200,0,0.2); }
    .empty-state { padding: 48px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 13px; }
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; font-family: var(--mono); color: var(--muted); margin-bottom: 32px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.err { background: var(--danger); }
    .status-dot.loading { background: var(--cyan); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } .main { padding: 16px; } .topbar { padding: 12px 16px; } }
  </style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 320 320">
        <defs><linearGradient id="lg" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#fff"/></linearGradient></defs>
        <path d="M85 255 C85 255 85 130 160 68 C235 130 235 255 235 255" fill="none" stroke="url(#lg)" stroke-width="30" stroke-linecap="round"/>
        <path d="M108 262 C108 262 108 145 160 95 C212 145 212 262 212 262" fill="#04040f" stroke="#04040f" stroke-width="3"/>
        <circle cx="160" cy="160" r="6" fill="#fff"/><circle cx="160" cy="160" r="3.5" fill="#00D4FF"/>
      </svg>
      <span>ARCNOVA</span>
    </div>
    <p class="login-subtitle">Admin Panel</p>
    <button class="connect-btn" id="connectBtn" onclick="connectAdmin()">Connect Wallet</button>
    <div class="login-error" id="loginError"></div>
    <p class="login-hint">Only authorized wallet can access</p>
  </div>
</div>
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">ARCNOVA</div>
    <div class="topbar-right">
      <span class="admin-badge">ADMIN</span>
      <span class="admin-addr" id="adminAddr"></span>
      <button class="logout-btn" onclick="logout()">Disconnect</button>
    </div>
  </div>
  <div class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-sub" id="lastUpdated">—</div>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Refresh
      </button>
    </div>
    <div class="stats-grid">
      <div class="stat-card cyan">
        <div class="stat-label">Unique Wallets</div>
        <div class="stat-value" id="statWallets">—</div>
        <div class="stat-sub">connected to store</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="statOrders">—</div>
        <div class="stat-sub" id="statOrdersSub">on-chain txs</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="statRevenue">—</div>
        <div class="stat-sub">USDC</div>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">—</span>
    </div>
    <div class="section-title">Recent Transactions</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Tx Hash</th><th>From</th><th>Amount</th><th>Block</th></tr></thead>
        <tbody id="txTable"><tr><td colspan="5"><div class="empty-state">—</div></td></tr></tbody>
      </table>
    </div>
    <div class="section-title">Memory Orders</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Buyer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody id="ordersTable"><tr><td colspan="5"><div class="empty-state">—</div></td></tr></tbody>
      </table>
    </div>
    <div class="section-title">Wallets</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Address</th><th>Orders</th><th>Total Spent</th></tr></thead>
        <tbody id="walletTable"><tr><td colspan="3"><div class="empty-state">—</div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<script>
let adminWallet = '';
function short(s) { return s ? s.slice(0,6) + '...' + s.slice(-4) : '—'; }
function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}
async function connectAdmin() {
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('connectBtn');
  errEl.style.display = 'none';
  if (!window.ethereum) {
    errEl.textContent = 'No wallet detected.'; errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'Connecting...';
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    adminWallet = accounts[0];
    const res = await fetch('/api/admin/stats', { headers: { 'x-admin-wallet': adminWallet } });
    if (res.status === 401) {
      errEl.textContent = 'Access denied. Unauthorized wallet.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Connect Wallet'; return;
    }
    document.getElementById('adminAddr').textContent = short(adminWallet);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    const data = await res.json();
    renderDashboard(data);
  } catch(e) {
    errEl.textContent = e.message || 'Connection failed.';
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Connect Wallet';
}
function logout() {
  adminWallet = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  setStatus('loading', 'Fetching...');
  try {
    const res = await fetch('/api/admin/stats', { headers: { 'x-admin-wallet': adminWallet } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderDashboard(data);
  } catch(e) {
    setStatus('err', 'Error: ' + e.message);
  }
  btn.classList.remove('loading');
}
function renderDashboard(data) {
  if (!data.success) { setStatus('err', data.error || 'Failed'); return; }
  const { stats, transactions, orders } = data;
  document.getElementById('statWallets').textContent = stats.uniqueWalletCount;
  document.getElementById('statOrders').textContent = stats.totalOrders;
  document.getElementById('statRevenue').textContent = stats.totalRevenue.toFixed(2);
  document.getElementById('statOrdersSub').textContent = 'on-chain · ' + stats.memoryOrders + ' in memory';
  document.getElementById('lastUpdated').textContent = 'Source: ' + data.source + ' · ' + new Date().toLocaleTimeString();
  setStatus('ok', 'Live · ' + transactions.length + ' transactions');
  const tbody = document.getElementById('txTable');
  tbody.innerHTML = transactions.length ? transactions.slice(0,50).map((tx,i) => `
    <tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td><a class="tx-link" href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">${short(tx.hash)}</a></td>
      <td class="addr-cell">${short(tx.from)}</td>
      <td class="amount-cell">${tx.value.toFixed(2)} USDC</td>
      <td style="color:var(--muted)">${tx.blockNumber}</td>
    </tr>`).join('') : '<tr><td colspan="5"><div class="empty-state">No transactions found</div></td></tr>';
  const otbody = document.getElementById('ordersTable');
  otbody.innerHTML = orders && orders.length ? orders.slice(0,50).map(o => `
    <tr>
      <td style="color:var(--muted)">${o.id}</td>
      <td class="addr-cell">${short(o.buyerAddress)}</td>
      <td class="amount-cell">${parseFloat(o.totalAmount).toFixed(2)} USDC</td>
      <td><span class="status-badge status-${o.status}">${o.status}</span></td>
      <td style="color:var(--muted);font-size:12px">${new Date(o.createdAt).toLocaleDateString()}</td>
    </tr>`).join('') : '<tr><td colspan="5"><div class="empty-state">No memory orders</div></td></tr>';
  const wtbody = document.getElementById('walletTable');
  wtbody.innerHTML = stats.wallets.length ? stats.wallets.map(w => `
    <tr>
      <td class="addr-cell">${w.address}</td>
      <td>${w.orderCount}</td>
      <td class="amount-cell">${w.totalSpent.toFixed(2)} USDC</td>
    </tr>`).join('') : '<tr><td colspan="3"><div class="empty-state">No wallets</div></td></tr>';
}
</script>
</body>
</html>
